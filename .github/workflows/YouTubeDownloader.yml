# .github/workflows/youtube-downloader.yml
name: 🎯 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Download Mode'
        required: true
        type: choice
        options:
          - single
          - playlist
          - channel
          - search
          - batch
        default: 'single'
      url:
        description: '🎬 URL / Search Query / Channel name (@ChannelName or ChannelName) / Multi-line URLs (batch)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: 'Quality (video: 144/360/480/720/1080 | audio: 128/192/320)'
        required: false
        type: string
        default: '720'
      video_codec:
        description: '🎞 Video Codec'
        required: false
        type: choice
        options:
          - h264
          - h265
          - av1
          - vp9
        default: 'h264'
      container:
        description: '📁 Container'
        required: false
        type: choice
        options:
          - mp4
          - mkv
          - webm
        default: 'mp4'
      frame_rate:
        description: '🎥 Frame Rate (leave blank for original)'
        required: false
        type: string
        default: ''
      max_videos:
        description: '🔢 Max results'
        required: false
        type: number
        default: 10
      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 50
      runner:
        description: '🖥️ Runner'
        required: false
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-large
          - self-hosted
        default: 'ubuntu-latest'
      dry_run:
        description: '🔍 Dry run (no download)'
        required: false
        type: boolean
        default: false
      embed_thumbnail:
        description: '🖼️ Embed thumbnail into video (video mode)'
        required: false
        type: boolean
        default: false
      download_subtitles:
        description: '💬 Download Persian/English subtitles'
        required: false
        type: boolean
        default: true

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'
  MODE: ${{ github.event.inputs.mode }}
  URL: ${{ github.event.inputs.url }}
  TYPE: ${{ github.event.inputs.type }}
  QUALITY: ${{ github.event.inputs.quality }}
  VIDEO_CODEC: ${{ github.event.inputs.video_codec }}
  CONTAINER: ${{ github.event.inputs.container }}
  FRAME_RATE: ${{ github.event.inputs.frame_rate }}
  MAX_VIDEOS: ${{ github.event.inputs.max_videos }}
  SPLIT_THRESHOLD_MB: ${{ github.event.inputs.split_threshold_mb }}
  DRY_RUN: ${{ github.event.inputs.dry_run }}
  EMBED_THUMBNAIL: ${{ github.event.inputs.embed_thumbnail }}
  DOWNLOAD_SUBS: ${{ github.event.inputs.download_subtitles }}

jobs:
  # ─── Simple modes (single, search, batch) ─────────────────────
  process-basic:
    if: ${{ github.event.inputs.mode == 'single' || github.event.inputs.mode == 'search' || github.event.inputs.mode == 'batch' }}
    name: 🚀 ${{ github.event.inputs.mode }} mode
    runs-on: ${{ github.event.inputs.runner }}
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🧰 System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 p7zip-full ffmpeg

      - name: 🐍 Setup Python & cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: 💾 Cache yt-dlp
        uses: actions/cache@v4
        with:
          path: ~/.cache/yt-dlp
          key: yt-dlp-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: 📦 Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: 🎯 Run
        run: python3 scripts/main.py

      - name: 📤 Commit & Push
        run: |
          bash scripts/push.sh

  # ─── Playlist/Channel with matrix when >20 videos ─────────────
  prep-playlist:
    if: ${{ github.event.inputs.mode == 'playlist' || github.event.inputs.mode == 'channel' }}
    name: 📋 Prepare playlist/channel
    runs-on: ${{ github.event.inputs.runner }}
    outputs:
      chunk_count: ${{ steps.preflight.outputs.chunk_count }}
      chunk_indices: ${{ steps.preflight.outputs.chunk_indices }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🧰 System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/yt-dlp
          key: yt-dlp-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: 📦 Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: 🔍 Extract video IDs & chunk
        id: preflight
        run: |
          python3 scripts/main.py --preflight
          # Now outputs are written to $GITHUB_OUTPUT by the script

      - name: 📤 Upload video list artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-list
          path: /tmp/video_list.json
          retention-days: 1

  download-chunks:
    needs: prep-playlist
    name: 🧩 Chunk ${{ matrix.chunk }}
    runs-on: ${{ github.event.inputs.runner }}
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prep-playlist.outputs.chunk_indices) }}
    timeout-minutes: 240
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🧰 System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 p7zip-full ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/yt-dlp
          key: yt-dlp-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: 📦 Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: 📥 Download artifact (video list)
        uses: actions/download-artifact@v4
        with:
          name: video-list
          path: /tmp

      - name: 📦 Download chunk
        run: |
          python3 scripts/main.py --download-chunk ${{ matrix.chunk }}

      - name: 📤 Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk }}
          path: /tmp/chunk_output/
          retention-days: 1

  assemble:
    needs: download-chunks
    if: ${{ always() && needs.download-chunks.result != 'failure' }}
    name: 🧩 Assemble & Push
    runs-on: ${{ github.event.inputs.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🧰 System dependencies
        run: sudo apt-get install -y -qq p7zip-full

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: 📥 Download all chunk artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all_chunks
          pattern: chunk-*

      - name: 📥 Download video list artifact
        uses: actions/download-artifact@v4
        with:
          name: video-list
          path: /tmp

      - name: 🧩 Merge chunks & generate final index
        run: python3 scripts/main.py --assemble

      - name: 📤 Commit & Push
        run: bash scripts/push.sh
